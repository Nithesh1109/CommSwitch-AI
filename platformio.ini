[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    jgromes/RadioLib@^7.1.2
    bblanchon/ArduinoJson@^7.0.4
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.12.1
    adafruit/Adafruit MQTT Library@^2.5.8

build_flags =
    -DCORE_DEBUG_LEVEL=3
